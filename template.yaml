AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Bolivian Banknote Detector API – Lambda (container image) + API Gateway

Globals:
  Function:
    Timeout: 120 # EasyOCR inference can take a while
    MemorySize: 2048 # 2 GB – enough for PyTorch CPU inference

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI (account.dkr.ecr.region.amazonaws.com/repo:tag)

Resources:
  # ── Lambda Function ──────────────────────────────────────────────────
  BillCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: !Ref ImageUri
      Architectures:
        - x86_64
      Events:
        # Catch-all proxy so every FastAPI route is forwarded
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
      Environment:
        Variables:
          # Add any env vars your app needs here
          LOG_LEVEL: INFO

  # ── HTTP API (API Gateway v2) ────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt BillCheckerFunction.Arn
